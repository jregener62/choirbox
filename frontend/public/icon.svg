  <rect x="212" y="140" width="12" height="205" rx="6" fill="white"/>
  <path d="M224 140 C224 140 300 110 300 170 C300 200 224 180 224 180" fill="white"/>
  <!-- Right note -->
  <ellipse cx="312" cy="360" rx="48" ry="36" fill="white" opacity="0.9" transform="rotate(-15, 312, 360)"/>
  <rect x="356" y="160" width="12" height="205" rx="6" fill="white" opacity="0.9"/>
  <path d="M368 160 C368 160 440 130 440 190 C440 220 368 200 368 200" fill="white" opacity="0.9"/>
  <!-- Sound waves -->
