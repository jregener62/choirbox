<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChoirBox — Upload-Auswahl C: Popover-Menue</title>
<script src="./lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1E2538; --bg2: #2A3348; --bg3: #354050; --bg-elevated: #303A50;
    --text: #E4E8EE; --text2: #9AA4B4; --text3: #6A7484;
    --accent: #818cf8; --accent-hover: #6366f1; --accent-dim: rgba(129,140,248,0.15);
    --border: rgba(148,163,184,0.10);
    --confirm: #3b82f6;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
         background: var(--bg); color: var(--text);
         max-width: 390px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column;
         -webkit-font-smoothing: antialiased; overflow: hidden; }

  /* --- Header --- */
  .topbar { display: flex; align-items: center; padding: 14px 16px; gap: 12px;
            background: var(--bg2); border-bottom: 1px solid var(--border); min-height: 52px;
            position: relative; z-index: 10; }
  .topbar-back { background: none; border: none; color: var(--text2); cursor: pointer; padding: 4px; }
  .topbar-title { flex: 1; font-size: 15px; color: var(--text); font-weight: 600;
                  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .topbar-actions { display: flex; align-items: center; gap: 4px; position: relative; }
  .topbar-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 8px;
                border-radius: 8px; display: flex; align-items: center; }
  .topbar-btn:active { background: rgba(255,255,255,0.05); }
  .topbar-btn.accent { color: var(--accent); }

  /* --- Content --- */
  .content { flex: 1; overflow-y: auto; padding: 8px 0; }
  .section-label { font-size: 11px; color: var(--text3); text-transform: uppercase;
                   letter-spacing: 0.5px; padding: 12px 16px 6px; font-weight: 600; }
  .file-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
  .file-icon { width: 36px; height: 36px; border-radius: 8px; display: flex;
               align-items: center; justify-content: center; flex-shrink: 0; }
  .file-icon.audio { background: rgba(129,140,248,0.15); color: var(--accent); }
  .file-icon.doc { background: rgba(59,130,246,0.15); color: var(--confirm); }
  .file-icon.chord { background: rgba(168,85,247,0.15); color: #a855f7; }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 14px; color: var(--text); overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; }
  .file-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .voice-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
                 color: white; }
  .voice-badge.sopran { background: #ec4899; }
  .voice-badge.tenor { background: #3b82f6; }
  .voice-badge.alle { background: #8b5cf6; }

  /* --- Mini Player --- */
  .mini-player { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
                 background: var(--bg2); border-top: 1px solid var(--border); }
  .mini-play { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title { font-size: 13px; color: var(--text); }
  .mini-progress { height: 2px; background: var(--bg3); border-radius: 1px; margin-top: 4px; }
  .mini-progress-fill { height: 100%; width: 35%; background: var(--accent); border-radius: 1px; }

  /* --- Bottom Nav --- */
  .bottom-nav { display: flex; background: var(--bg2); border-top: 1px solid var(--border);
                padding: 8px 0 20px; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
              background: none; border: none; color: var(--text3); cursor: pointer;
              font-size: 10px; font-family: inherit; padding: 4px 0; }
  .nav-item.active { color: var(--accent); }

  /* --- Backdrop --- */
  .backdrop { position: fixed; inset: 0; z-index: 50;
              opacity: 0; pointer-events: none; transition: opacity 0.15s ease; }
  .backdrop.active { opacity: 1; pointer-events: auto; }

  /* --- Popover Menu --- */
  .popover { position: absolute; top: 52px; right: 12px; z-index: 60;
             background: var(--bg-elevated); border: 1.5px solid var(--border);
             border-radius: 14px; width: 260px;
             box-shadow: 0 8px 32px rgba(0,0,0,0.4);
             opacity: 0; pointer-events: none; transform: translateY(-8px) scale(0.97);
             transform-origin: top right;
             transition: opacity 0.18s ease, transform 0.18s ease; }
  .popover.active { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }

  /* Arrow */
  .popover::before { content: ''; position: absolute; top: -7px; right: 18px;
                     width: 14px; height: 14px; background: var(--bg-elevated);
                     border: 1.5px solid var(--border); border-bottom: none; border-right: none;
                     transform: rotate(45deg); border-radius: 2px 0 0 0; }
  .popover::after { content: ''; position: absolute; top: 0; right: 10px;
                    width: 30px; height: 4px; background: var(--bg-elevated); }

  .popover-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px;
                  border: none; background: none; color: var(--text); font-size: 14px;
                  font-family: inherit; cursor: pointer; text-align: left; width: 100%;
                  transition: background 0.12s; }
  .popover-item:first-child { border-radius: 12px 12px 0 0; }
  .popover-item:last-child { border-radius: 0 0 12px 12px; }
  .popover-item:active { background: rgba(255,255,255,0.05); }
  .popover-item + .popover-item { border-top: 1px solid var(--border); }

  .pop-icon { width: 32px; height: 32px; border-radius: 8px; display: flex;
              align-items: center; justify-content: center; flex-shrink: 0; }
  .pop-icon.text { background: rgba(59,130,246,0.15); color: var(--confirm); }
  .pop-icon.chord { background: rgba(168,85,247,0.15); color: #a855f7; }
  .pop-icon.file { background: rgba(129,140,248,0.15); color: var(--accent); }

  .pop-label { font-weight: 500; }
  .pop-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }

  /* --- Variant Badge --- */
  .variant-badge { position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
                   background: var(--accent); color: white; font-size: 11px; font-weight: 700;
                   padding: 4px 12px; border-radius: 6px; z-index: 200;
                   letter-spacing: 0.5px; }
</style>
</head>
<body>

<div class="variant-badge">VARIANTE C — Popover-Menue</div>

<!-- Header -->
<div class="topbar">
  <button class="topbar-back"><i data-lucide="chevron-left" style="width:20px;height:20px"></i></button>
  <div class="topbar-title">Hallelujah (Leonard Cohen)</div>
  <div class="topbar-actions">
    <button class="topbar-btn accent" id="uploadBtn"><i data-lucide="plus" style="width:22px;height:22px"></i></button>
    <button class="topbar-btn"><i data-lucide="ellipsis-vertical" style="width:20px;height:20px"></i></button>
  </div>
</div>

<!-- Popover -->
<div class="popover" id="popover">
  <button class="popover-item">
    <div class="pop-icon text"><i data-lucide="clipboard-paste" style="width:18px;height:18px"></i></div>
    <div>
      <div class="pop-label">Text einfuegen</div>
      <div class="pop-desc">Songtext aus Zwischenablage</div>
    </div>
  </button>
  <button class="popover-item">
    <div class="pop-icon chord"><i data-lucide="guitar" style="width:18px;height:18px"></i></div>
    <div>
      <div class="pop-label">Chordsheet einfuegen</div>
      <div class="pop-desc">Akkord-Text aus Zwischenablage</div>
    </div>
  </button>
  <button class="popover-item">
    <div class="pop-icon file"><i data-lucide="file-up" style="width:18px;height:18px"></i></div>
    <div>
      <div class="pop-label">Datei auswaehlen</div>
      <div class="pop-desc">Audio, PDF oder Textdatei</div>
    </div>
  </button>
</div>

<!-- Content -->
<div class="content">
  <div class="section-label">Aufnahmen</div>
  <div class="file-item">
    <div class="file-icon audio"><i data-lucide="music" style="width:18px;height:18px"></i></div>
    <div class="file-info">
      <div class="file-name">Hallelujah — Sopran</div>
      <div class="file-meta">3:42 · MP3</div>
    </div>
    <span class="voice-badge sopran">Sopran</span>
  </div>
  <div class="file-item">
    <div class="file-icon audio"><i data-lucide="music" style="width:18px;height:18px"></i></div>
    <div class="file-info">
      <div class="file-name">Hallelujah — Tenor</div>
      <div class="file-meta">3:42 · MP3</div>
    </div>
    <span class="voice-badge tenor">Tenor</span>
  </div>
  <div class="file-item">
    <div class="file-icon audio"><i data-lucide="music" style="width:18px;height:18px"></i></div>
    <div class="file-info">
      <div class="file-name">Hallelujah — Alle Stimmen</div>
      <div class="file-meta">3:42 · MP3</div>
    </div>
    <span class="voice-badge alle">Alle</span>
  </div>

  <div class="section-label">Dokumente</div>
  <div class="file-item">
    <div class="file-icon doc"><i data-lucide="file-text" style="width:18px;height:18px"></i></div>
    <div class="file-info">
      <div class="file-name">Hallelujah — Songtext</div>
      <div class="file-meta">Text · 2 Seiten</div>
    </div>
  </div>
  <div class="file-item">
    <div class="file-icon chord"><i data-lucide="guitar" style="width:18px;height:18px"></i></div>
    <div class="file-info">
      <div class="file-name">Hallelujah — Akkorde (C)</div>
      <div class="file-meta">Chordsheet · 8 Akkorde</div>
    </div>
  </div>
</div>

<!-- Mini Player -->
<div class="mini-player">
  <button class="mini-play"><i data-lucide="play" style="width:20px;height:20px"></i></button>
  <div class="mini-info">
    <div class="mini-title">Hallelujah — Sopran</div>
    <div class="mini-progress"><div class="mini-progress-fill"></div></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-item active"><i data-lucide="library" style="width:20px;height:20px"></i><span>Lieder</span></button>
  <button class="nav-item"><i data-lucide="heart" style="width:20px;height:20px"></i><span>Favoriten</span></button>
  <button class="nav-item"><i data-lucide="settings" style="width:20px;height:20px"></i><span>Einstellungen</span></button>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop"></div>

<script>
  const backdrop = document.getElementById('backdrop');
  const popover = document.getElementById('popover');
  const uploadBtn = document.getElementById('uploadBtn');

  function open() {
    popover.classList.add('active');
    backdrop.classList.add('active');
  }
  function close() {
    popover.classList.remove('active');
    backdrop.classList.remove('active');
  }
  function toggle() {
    if (popover.classList.contains('active')) close();
    else open();
  }

  uploadBtn.addEventListener('click', toggle);
  backdrop.addEventListener('click', close);

  // Auto-open on load, so the popover is visible for preview
  window.addEventListener('load', () => {
    try { if (window.lucide) lucide.createIcons(); } catch (e) { console.warn('lucide:', e); }
    setTimeout(open, 200);
  });
</script>
</body>
</html>
