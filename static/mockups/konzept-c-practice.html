<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChoirBox — Konzept C: Practice-First</title>

<script src="/mockups/lucide.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
    --accent: #818cf8; --accent-hover: #6366f1; --accent-dim: rgba(129,140,248,0.15);
    --amber: #f59e0b; --amber-dim: rgba(245,158,11,0.25);
    --border: #334155;
  }
  body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text);
         max-width: 390px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column;
         -webkit-font-smoothing: antialiased; }

  .topbar { display: flex; align-items: center; padding: 12px 16px; gap: 12px; }
  .topbar-back { background: none; border: none; color: var(--text2); cursor: pointer; padding: 8px; }
  .topbar-title { flex: 1; text-align: center; font-size: 13px; color: var(--text2); font-weight: 500; }

  .player { flex: 1; display: flex; flex-direction: column; padding: 0 20px; overflow-y: auto; }

  /* -- Track Info (oben) -- */
  .track-info { margin-bottom: 16px; }
  .track-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .track-path { font-size: 13px; color: var(--text3); }

  /* -- Waveform -- */
  .waveform-wrap { margin-bottom: 4px; }
  .waveform { display: flex; align-items: center; height: 80px; gap: 1.5px; }
  .waveform-bar { flex: 1; border-radius: 2px; min-width: 2px; }
  .waveform-bar.played { background: var(--accent); }
  .waveform-bar.unplayed { background: var(--bg3); }
  .waveform-bar.loop-played { background: var(--amber); }
  .waveform-bar.loop-unplayed { background: var(--amber-dim); }
  .loop-labels { position: relative; height: 14px; margin-top: -2px; }
  .loop-label { position: absolute; font-size: 10px; font-weight: 700; color: var(--amber); }
  .timestamps { display: flex; justify-content: space-between; font-size: 12px; color: var(--text3);
                 font-variant-numeric: tabular-nums; margin-bottom: 12px; }

  /* -- Markers -- */
  .markers { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .marker-chip { padding: 4px 10px; border-radius: 14px; background: var(--bg2); border: 1px solid var(--border);
                 font-size: 11px; color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .marker-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); }

  /* -- Divider -- */
  .divider { height: 1px; background: var(--border); margin: 0 -20px 20px; }

  /* -- KERN: A + Play + B -- */
  .core-row { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
  .ab-core-btn { width: 56px; height: 56px; border-radius: 12px; border: 2px solid var(--border);
                 background: none; color: var(--text); font-size: 18px; font-weight: 700; cursor: pointer;
                 display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .ab-core-btn.active { border-color: var(--amber); background: var(--amber-dim); color: var(--amber); }
  .play-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); border: none;
              color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
              box-shadow: 0 4px 20px rgba(129,140,248,0.3); }
  .play-btn:active { background: var(--accent-hover); transform: scale(0.95); }

  /* -- Zweite Reihe: Skip + Loop -- */
  .control-row { display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 20px; }
  .ctrl-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 10px;
              display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; font-family: inherit; }
  .ctrl-btn.active { color: var(--accent); }
  .ctrl-btn.amber { color: var(--amber); }

  /* -- Dritte Reihe: Marker + Tempo -- */
  .action-row { display: flex; justify-content: center; gap: 12px; padding-bottom: 20px; }
  .action-btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); background: none;
                color: var(--text2); font-size: 13px; cursor: pointer; display: flex; align-items: center;
                gap: 6px; font-family: inherit; }
  .action-btn:active { background: var(--bg3); }

  .concept-label { position: fixed; top: 8px; right: 8px; background: #22c55e; color: white;
                   padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 600; z-index: 10; }
  .concept-hint { position: fixed; top: 8px; left: 8px; background: var(--bg3); color: var(--text2);
                  padding: 4px 10px; border-radius: 6px; font-size: 10px; z-index: 10; }
</style>
</head>
<body>

<div class="concept-label">Konzept C: Practice-First</div>
<div class="concept-hint">Empfehlung</div>

<div class="topbar">
  <button class="topbar-back"><i data-lucide="chevron-down" style="width:24px;height:24px"></i></button>
  <div class="topbar-title">Wird abgespielt</div>
  <div style="width:40px"></div>
</div>

<div class="player">
  <!-- Track Info -->
  <div class="track-info">
    <div class="track-name">A - Bring Me Little Water (Brian).mp3</div>
    <div class="track-path">/Bring Me Little Water</div>
  </div>

  <!-- Waveform -->
  <div class="waveform-wrap">
    <div class="waveform" id="waveform"></div>
    <div class="loop-labels">
      <span class="loop-label" style="left:28%">A</span>
      <span class="loop-label" style="left:65%">B</span>
    </div>
  </div>
  <div class="timestamps">
    <span>0:42</span>
    <span>1:36</span>
  </div>

  <!-- Markers -->
  <div class="markers">
    <div class="marker-chip"><span class="marker-dot"></span> 0:12</div>
    <div class="marker-chip"><span class="marker-dot"></span> 0:45</div>
    <div class="marker-chip"><span class="marker-dot"></span> 1:23</div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- KERN: A + Play + B auf EINER Zeile -->
  <div class="core-row">
    <button class="ab-core-btn active">A</button>
    <button class="play-btn"><i data-lucide="pause" style="width:32px;height:32px"></i></button>
    <button class="ab-core-btn active">B</button>
  </div>

  <!-- Skip + Loop -->
  <div class="control-row">
    <button class="ctrl-btn">
      <i data-lucide="rewind" style="width:18px;height:18px"></i> 15s
    </button>
    <button class="ctrl-btn amber">
      <i data-lucide="repeat" style="width:18px;height:18px"></i> Loop
    </button>
    <button class="ctrl-btn">
      15s <i data-lucide="fast-forward" style="width:18px;height:18px"></i>
    </button>
  </div>

  <!-- Marker + Tempo -->
  <div class="action-row">
    <button class="action-btn">
      <i data-lucide="pin" style="width:14px;height:14px"></i> Marker
    </button>
    <button class="action-btn">
      <i data-lucide="gauge" style="width:14px;height:14px"></i> 1.0x
    </button>
    <button class="action-btn">
      <i data-lucide="heart" style="width:14px;height:14px"></i> Favorit
    </button>
  </div>
</div>

<script>
  const wf = document.getElementById('waveform');
  const bars = 80;
  const playPos = 0.45;
  const loopA = 0.28, loopB = 0.65;
  for (let i = 0; i < bars; i++) {
    const frac = i / bars;
    const h = 15 + Math.random() * 65;
    const bar = document.createElement('div');
    bar.className = 'waveform-bar';
    bar.style.height = h + '%';
    const inLoop = frac >= loopA && frac <= loopB;
    const played = frac <= playPos;
    if (inLoop && played) bar.classList.add('loop-played');
    else if (inLoop) bar.classList.add('loop-unplayed');
    else if (played) bar.classList.add('played');
    else bar.classList.add('unplayed');
    wf.appendChild(bar);
  }
  lucide.createIcons();
</script>
</body>
</html>
